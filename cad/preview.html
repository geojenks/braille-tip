<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>braillegen — interactive preview</title>
<style>
  :root{
    --bg:#f5f3ee; --panel:#fff; --ink:#1c1b19; --ink2:#5c594f; --line:#e3ded3;
    --orange:#d8541a; --accent:#d8541a; --sel:#d8541a; --sel-tx:#fff; --btn:#efece4;
    --report:#f3efe6; --canvas:#e9e6df;
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#16151a; --panel:#1f1e25; --ink:#ece9e3; --ink2:#a7a39a; --line:#34323c;
      --orange:#ff7a45; --accent:#ff7a45; --sel:#ff7a45; --sel-tx:#16151a; --btn:#2a2932;
      --report:#191820; --canvas:#101015;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink);
       display:grid;grid-template-columns:320px 1fr;height:100vh}
  @media(max-width:760px){body{grid-template-columns:1fr;grid-template-rows:auto 1fr}}
  aside{padding:20px;overflow-y:auto;border-right:1px solid var(--line);background:var(--panel)}
  h1{font-size:18px;margin:0 0 2px}
  .sub{color:var(--ink2);font-size:12.5px;margin:0 0 18px;line-height:1.45}
  .grp{margin:0 0 16px}
  .grp>label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
             color:var(--ink2);margin:0 0 7px;font-weight:600}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1 1 auto;min-width:54px;padding:8px 6px;border:1px solid var(--line);
              background:var(--btn);color:var(--ink);border-radius:8px;cursor:pointer;
              font-size:13px;font-family:inherit;transition:.12s;line-height:1.15}
  .seg button small{display:block;font-size:10.5px;color:var(--ink2);margin-top:2px}
  .seg button:hover{border-color:var(--accent)}
  .seg button[aria-pressed="true"]{background:var(--sel);color:var(--sel-tx);border-color:var(--sel)}
  .seg button[aria-pressed="true"] small{color:var(--sel-tx);opacity:.85}
  .row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink)}
  .report{background:var(--report);border:1px solid var(--line);border-radius:10px;padding:12px 13px;
          font-size:12.5px;line-height:1.7;margin-top:6px}
  .report b{font-weight:600}
  .report .verdict{color:var(--orange);font-weight:600}
  .cmd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;background:var(--report);
       border:1px solid var(--line);border-radius:8px;padding:9px 10px;margin-top:8px;
       white-space:pre-wrap;word-break:break-all;color:var(--ink2)}
  main{position:relative}
  canvas{display:block}
  #hint{position:absolute;left:12px;bottom:10px;font-size:11.5px;color:var(--ink2);
        background:var(--panel);padding:4px 9px;border-radius:7px;border:1px solid var(--line)}
  #status{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:12.5px;
          color:var(--ink2);background:var(--panel);padding:5px 12px;border-radius:8px;
          border:1px solid var(--line);opacity:0;transition:.2s}
  #status.show{opacity:1}
  a{color:var(--orange)}
</style>
</head>
<body>
<aside>
  <h1>braillegen preview</h1>
  <p class="sub">Mix &amp; match a Braille-tip. Drag to rotate, scroll to zoom. Geometry is rendered from
  <code>braillegen.scad</code>; the report mirrors what it prints.</p>

  <div class="grp">
    <label>Size — taxel rings</label>
    <div class="seg" id="size">
      <button data-v="1">1 ring<small>7 taxels</small></button>
      <button data-v="2">2 rings<small>19 taxels</small></button>
      <button data-v="3">3 rings<small>37 taxels</small></button>
    </div>
  </div>

  <div class="grp">
    <label>Spacing — taxel pitch</label>
    <div class="seg" id="pitch">
      <button data-v="2.0">2.0 mm</button>
      <button data-v="2.5">2.5 mm</button>
      <button data-v="3.0">3.0 mm</button>
    </div>
  </div>

  <div class="grp">
    <label>Tube coupling</label>
    <div class="seg" id="coupling">
      <button data-v="barb">Barbs<small>tube slips on</small></button>
      <button data-v="heatset">Heat-push<small>insert + coupler</small></button>
    </div>
  </div>

  <div class="grp">
    <label>View</label>
    <div class="seg" id="view">
      <button data-v="assembly">Assembly</button>
      <button data-v="tip">Tip</button>
      <button data-v="base">Base</button>
    </div>
  </div>

  <div class="grp">
    <label class="row"><input type="checkbox" id="cut"> Cross-section (slice)</label>
  </div>

  <div class="report" id="report"></div>
  <div class="cmd" id="cmd"></div>
</aside>

<main>
  <div id="status">loading…</div>
  <div id="hint">drag rotate · scroll zoom · right-drag pan</div>
</main>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { STLLoader }    from 'three/addons/loaders/STLLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---- design constants (match braillegen.scad defaults) ----
const TAXEL_DIA=1.0, RIM=1.2, MEM=0.8, CHAN=0.8, TUBE_OD=2.0, HEATSET_DIA=4.0, PLUG_H=2.0, BASE_H=6.0;

const state = { rings:2, pitch:2.5, coupling:'barb', view:'assembly', cut:false };

// optional deep-link, e.g. preview.html?rings=3&pitch=2.5&coupling=heatset&cut=1
{ const q=new URLSearchParams(location.search);
  if(q.has('rings'))    state.rings=Number(q.get('rings'));
  if(q.has('pitch'))    state.pitch=Number(q.get('pitch'));
  if(q.has('coupling')) state.coupling=q.get('coupling');
  if(q.has('view'))     state.view=q.get('view');
  if(q.has('cut'))      state.cut=['1','true','yes'].includes(q.get('cut')); }

// ---- live report maths (same formulas as the .scad) ----
function calc(s){
  const R=s.rings, p=s.pitch;
  const nt = 3*R*R + 3*R + 1;
  const faceR = R*p + TAXEL_DIA/2 + RIM;
  const w = s.coupling==='barb' ? TUBE_OD : HEATSET_DIA;
  const cpitch = Math.max(p, w + 2.0);
  const couplR = R*cpitch + w/2 + RIM;
  const baseHmin = PLUG_H + R*(cpitch-p) + 1.0;
  const baseH = Math.max(BASE_H, baseHmin);
  const minFeat = Math.min(TAXEL_DIA, CHAN, MEM);
  const verdict = minFeat<1.0 ? 'resin / SLA (sub-1 mm features)'
               : minFeat<1.5 ? 'resin recommended; FDM marginal' : 'FDM ok';
  return {nt, faceR, cpitch, couplR, baseH, verdict};
}
function fmt(x){ return (Math.round(x*10)/10).toFixed(1); }

function pp(p){ return p.toFixed(1).replace('.',''); }              // 2.5 -> "25"
function files(s){
  const t = `preview_stl/tip_r${s.rings}_p${pp(s.pitch)}.stl`;
  const b = `preview_stl/base_r${s.rings}_p${pp(s.pitch)}_${s.coupling}.stl`;
  return {t, b};
}

function updatePanel(){
  const c = calc(state);
  document.getElementById('report').innerHTML =
    `<b>${c.nt}</b> taxels &nbsp;·&nbsp; ${state.rings} ring(s)<br>`+
    `face: <b>${fmt(2*c.faceR)} mm</b> across<br>`+
    `coupling pitch: <b>${fmt(c.cpitch)} mm</b><br>`+
    `base: <b>${fmt(2*c.couplR)} mm</b> wide, <b>${fmt(c.baseH)} mm</b> tall<br>`+
    `print: <span class="verdict">${c.verdict}</span>`;
  document.getElementById('cmd').textContent =
    `openscad -o base.stl \\\n  -D 'part="base"' -D n_rings=${state.rings} \\\n  -D pitch=${state.pitch} -D 'coupling="${state.coupling}"' \\\n  braillegen.scad`;
}

// ---- three.js scene ----
const main = document.querySelector('main');
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.localClippingEnabled = true;
main.appendChild(renderer.domElement);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 1000);
camera.up.set(0,0,1);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.05));
const key = new THREE.DirectionalLight(0xffffff, 1.4); key.position.set(20,-30,40); scene.add(key);
const fill= new THREE.DirectionalLight(0xffffff, 0.5); fill.position.set(-25,20,10); scene.add(fill);

const clip = new THREE.Plane(new THREE.Vector3(0,-1,0), 0);  // hides y>0 when active
const loader = new STLLoader();
const group = new THREE.Group(); scene.add(group);

const matTip  = new THREE.MeshStandardMaterial({color:0x77a23f, roughness:.75, metalness:.02, side:THREE.DoubleSide});
const matBase = new THREE.MeshStandardMaterial({color:0x9aa0a8, roughness:.55, metalness:.05, side:THREE.DoubleSide});

function setStatus(t){ const s=document.getElementById('status'); if(t){s.textContent=t;s.classList.add('show');} else s.classList.remove('show'); }
function loadSTL(url){ return new Promise((res,rej)=>loader.load(url, g=>res(g), undefined, e=>rej(url))); }

let token=0;
async function rebuild(){
  const my = ++token;
  setStatus('loading…');
  const {t,b} = files(state);
  try{
    const need = [];
    if(state.view!=='base') need.push(['tip',t]);
    if(state.view!=='tip')  need.push(['base',b]);
    const loaded = await Promise.all(need.map(([k,u])=>loadSTL(u).then(g=>[k,g])));
    if(my!==token) return;                         // a newer change superseded us
    group.clear();
    let baseTopZ = calc(state).baseH;
    const meshes=[];
    for(const [k,geo] of loaded){
      geo.computeVertexNormals(); geo.computeBoundingBox();
      const m = new THREE.Mesh(geo, k==='tip'?matTip:matBase);
      if(k==='tip') m.position.z = baseTopZ - PLUG_H;  // seat plug into base socket
      group.add(m); meshes.push(m);
    }
    applyClip();
    frame();
    setStatus('');
  }catch(url){
    if(my!==token) return;
    setStatus('missing '+String(url).split('/').pop()+' — run make_previews');
  }
}

function applyClip(){
  const planes = state.cut ? [clip] : [];
  matTip.clippingPlanes = planes; matBase.clippingPlanes = planes;
  matTip.needsUpdate = matBase.needsUpdate = true;
}

function frame(){
  group.position.set(0,0,0);                       // zero leftover offset before measuring
  const box = new THREE.Box3().setFromObject(group);
  if(box.isEmpty()) return;
  const c = box.getCenter(new THREE.Vector3());
  const sz = box.getSize(new THREE.Vector3());
  const r = Math.max(sz.x,sz.y,sz.z);
  group.position.set(-c.x,-c.y,-c.z);              // recenter at origin
  const d = r*2.4;
  camera.position.set(d*0.75, -d, d*0.55);
  camera.near = r/50; camera.far = r*20; camera.updateProjectionMatrix();
  controls.target.set(0,0,0); controls.update();
}

function resize(){
  const w=main.clientWidth, h=main.clientHeight;
  renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

(function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene,camera); })();

// ---- wire controls ----
function bindSeg(id, key, cast=v=>v){
  const root=document.getElementById(id);
  root.querySelectorAll('button').forEach(btn=>{
    const v=cast(btn.dataset.v);
    btn.setAttribute('aria-pressed', state[key]==v);
    btn.onclick=()=>{
      state[key]=v;
      root.querySelectorAll('button').forEach(b=>b.setAttribute('aria-pressed', cast(b.dataset.v)==v));
      updatePanel(); rebuild();
    };
  });
}
bindSeg('size','rings', Number);
bindSeg('pitch','pitch', Number);
bindSeg('coupling','coupling');
bindSeg('view','view');
const cutBox = document.getElementById('cut');
cutBox.checked = state.cut;
cutBox.onchange = e=>{ state.cut=e.target.checked; applyClip(); };

resize(); updatePanel(); rebuild();
</script>
</body>
</html>
